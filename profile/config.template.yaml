# Study — Config Template
# Generated by Study Open Source setup
# Docs: https://hermes-agent.nousresearch.com/docs
#
# Provider auto-configurato dallo script di setup.
# Per cambiare provider dopo l'installazione:
#   1. Modifica model.api_key, model.base_url, model.default
#   2. Riavvia Hermes

model:
  api_key: {{LLM_API_KEY}}
  api_mode: openai
  base_url: {{LLM_BASE_URL}}
  default: {{LLM_MODEL}}
  provider: custom

# ── Provider alternativi (riferimento rapido) ─────────────
# Groq (FREE):       base_url: https://api.groq.com/openai/v1      model: llama-3.3-70b-versatile
# DeepSeek (CHEAP):  base_url: https://api.deepseek.com/v1         model: deepseek-chat
# OpenAI:            base_url: https://api.openai.com/v1           model: gpt-4o
# OpenRouter:        base_url: https://openrouter.ai/api/v1        model: openai/gpt-4o
# Anthropic:         base_url: https://api.anthropic.com/v1        model: claude-sonnet-4 (richiede API mode anthropic)

agent:
  max_turns: 90
  gateway_timeout: 1800
  tool_use_enforcement: auto

# Canali attivi
# ==============
# Per usare Study via CLI / Web (terminale Hermes):
#   - toolsets deve includere "hermes-cli" (default)
#   - nessuna configurazione aggiuntiva
#
# Per usare Study via Telegram:
#   1. Crea un bot con @BotFather su Telegram
#   2. Inserisci il token qui sotto
#   3. Aggiungi "hermes-telegram" a toolsets

platform_toolsets:
  cli:
  - browser
  - clarify
  - cronjob
  - delegation
  - file
  - memory
  - session_search
  - skills
  - terminal
  - todo
  - tts
  - vision
  - web
{{TELEGRAM_TOOLSET}}

telegram:
  reactions: false
  allowed_chats: "{{TELEGRAM_ALLOWED_CHATS}}"

gateway:
  strict: false
  # Se usi Telegram, assicurati che GATEWAY_ALLOW_ALL_USERS=true sia nel .env
  # del profilo, altrimenti il gateway non risponde su Telegram

security:
  redact_secrets: true
  tirith_enabled: true

display:
  compact: false
  show_reasoning: true
  streaming: true
  language: it

terminal:
  backend: local
  cwd: .

memory:
  memory_enabled: true
  user_profile_enabled: true

skills:
  external_dirs: []

timezone: Europe/Rome

logging:
  level: INFO
